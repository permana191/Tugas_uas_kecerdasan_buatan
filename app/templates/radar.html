{% extends "base.html" %}

{% block content %}
<div class="glass-container" style="max-width: 100%; padding: 1.5rem;">
    <div style="margin-bottom: 1rem;">
        <h2 style="color: var(--accent-cyan); font-weight: 600;">Radar Atmosfer Global</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem;">Pemantauan pergerakan angin dan cuaca real-time di seluruh dunia.</p>
    </div>

    <!-- Iframe Interaktif dari Windy.com (Dipusatkan di Indonesia) -->
    <div style="border-radius: 12px; overflow: hidden; border: 1px solid var(--glass-border); box-shadow: 0 0 20px rgba(0, 240, 255, 0.1);">
        <iframe 
            width="100%" 
            height="650" 
            src="https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=mm&metricTemp=%C2%B0C&metricWind=km%2Fh&zoom=5&overlay=wind&product=ecmwf&level=surface&lat=-0.789&lon=113.921&detailLat=-6.2146&detailLon=106.8451&marker=true" 
            frameborder="0" 
            style="border:0;" 
            allowfullscreen>
        </iframe>
    </div>
</div>
{% endblock %}
